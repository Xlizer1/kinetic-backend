name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/kite/kinetic-backend

            # Install Go 1.26 if not present (first-time only)
            if [ ! -f /usr/local/go/bin/go ]; then
              curl -fsSL https://go.dev/dl/go1.26.2.linux-amd64.tar.gz -o /tmp/go.tar
              tar -C /tmp -xzf /tmp/go.tar
              rm -rf /usr/local/go
              mv /tmp/go /usr/local/go
            fi
            export PATH=$PATH:/usr/local/go/bin

            # Pull latest code from GitHub
            git fetch origin
            git checkout main
            git pull origin main

            # Download dependencies
            go mod download

            # Build binary
            CGO_ENABLED=0 go build -o kinetic-server ./cmd/server

            # Restart the service
            systemctl restart kinetic

            echo "Deployment complete!"